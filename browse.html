<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourManga - Descubre</title>
  <meta name="theme-color" content="#ffe4f2" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="browse.css" />
  <meta name="description" content="YourManga descubre tus cómics y manhwas favoritos" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-logo">
        <img src="logo.svg" alt="YourManga" class="app-logo" />
        <div>
          <strong>YourManga</strong>
          <div class="app-version">v1.0.1</div>
        </div>
      </div>
      <nav class="nav-bar">
        <a class="nav-link" href="home.html">Inicio</a>
        <a class="nav-link active" href="browse.html">Descubre</a>
        <a class="nav-link" href="search.html">Buscar</a>
        <a class="nav-link" href="library.html">Biblioteca</a>
        <a class="nav-link" href="profile.html">Perfil</a>
        <a class="nav-link nav-admin hidden" href="admin.html">Estudio</a>
      </nav>
      <div class="user-panel">
        <button id="installBtn" class="secondary hidden">Instalar app</button>
        <div id="userAvatarWrapper" class="user-avatar hidden"><img id="userAvatar" class="user-avatar-img" src="" alt="Avatar" /></div>
        <span id="userName"></span>
        <button id="signOutBtn" class="primary ghost hidden">Salir</button>
      </div>
    </header>

    <main>
      <section class="page active">
        <div class="page-header">
          <h2>Descubre historias</h2>
        </div>
        <div class="genre-row">
          <button class="genre-pill active">Todo</button>
          <button class="genre-pill">Romance</button>
          <button class="genre-pill">Fantasia</button>
          <button class="genre-pill">Acción</button>
          <button class="genre-pill">BL</button>
          <button class="genre-pill">Drama</button>
          <button class="genre-pill">Comedia</button>
        </div>
        <div class="browse-toolbar">
          <input id="searchInput" type="search" placeholder="Buscar por título, autor o etiqueta" />
          <select id="filterType">
            <option value="all">Todos los tipos</option>
            <option value="MANHWA">Manhwa</option>
            <option value="MANGA">Manga</option>
            <option value="CÓMIC">Cómic</option>
          </select>
          <select id="filterStatus">
            <option value="all">Todos los estados</option>
            <option value="EN EMISIÓN">En emisión</option>
            <option value="FINALIZADO">Finalizado</option>
            <option value="PRÓXIMAMENTE">Próximamente</option>
          </select>
        </div>
        <div class="browse-filters" id="tagFilters"></div>
        <div class="cards-grid" id="browseGrid"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a class="nav-link" href="home.html">Inicio</a>
      <a class="nav-link active" href="browse.html">Descubre</a>
      <a class="nav-link" href="search.html">Buscar</a>
      <a class="nav-link" href="library.html">Biblioteca</a>
      <a class="nav-link" href="profile.html">Perfil</a>
      <a class="nav-link nav-admin hidden" href="admin.html">Estudio</a>
    </nav>

    <div id="modalOverlay" class="modal-overlay hidden">
      <div class="modal-card" id="modalCard"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="common.js"></script>
  <script src="auth.js"></script>
  <script src="browse.js"></script>
</body>
</html>
